name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Install dependencies
      run: |
        npm install
        npm install --prefix field-sync
        npm install --prefix field-sync/backend
    - name: Build frontend
      run: |
        cd field-sync && npm run build
    - name: Run backend tests
      run: |
        npm run test --prefix field-sync/backend
    - name: Upload frontend build artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: field-sync/.next
